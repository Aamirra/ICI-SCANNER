Name: Crypto News Alert

on:
  schedule:
    - cron: '*/5 * * * *' # Har 5 minute baad
  workflow_dispatch:

jobs:
  run-news-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Run News Alert
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_URL: ${{ secrets.DATABASE_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node -e "require('./services/cryptoNewsAlert').fetchAndSendNews().then(() => process.exit(0)).catch(err => { console.error(err); process.exit(1); })"
