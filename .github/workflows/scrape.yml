name: MentFX Sentiment Scraper

on:
  schedule:
    # Har 2.5 ghante baad automatic chalega (Cron Job)
    - cron: '0 */2 * * *'
  # Agar hum khud click karke check karna chahein to uske liye:
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python: '3.10'

    - name: Install Packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      run: python sentiment/sentiment_scraper.py
