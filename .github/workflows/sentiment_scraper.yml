name: ICI Sentiment Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
    - cron: '30 1/2 * * *'
  workflow_dispatch:

jobs:
  scrape-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run sentiment scraper & save to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python sentiment/sentiment_scraper.py
