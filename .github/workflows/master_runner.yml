name: Master Auto Runner

on:
  schedule:
    # Har 30 minute par chalega (e.g., 4:00, 4:30, 5:00)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Manual run button ke liye

jobs:
  run-all-scanners:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      # Step 1: Market Scanner
      - name: Run Market Scanner
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TD_KEY_1: ${{ secrets.TD_KEY_1 }}
          TD_KEY_2: ${{ secrets.TD_KEY_2 }}
          TD_KEY_3: ${{ secrets.TD_KEY_3 }}
          TD_KEY_4: ${{ secrets.TD_KEY_4 }}
          TD_KEY_5: ${{ secrets.TD_KEY_5 }}
          TD_KEY_6: ${{ secrets.TD_KEY_6 }}
          TD_KEY_7: ${{ secrets.TD_KEY_7 }}
          TD_KEY_8: ${{ secrets.TD_KEY_8 }}
          TD_KEY_9: ${{ secrets.TD_KEY_9 }}
          TD_KEY_10: ${{ secrets.TD_KEY_10 }}
          TD_KEY_11: ${{ secrets.TD_KEY_11 }}
          TD_KEY_12: ${{ secrets.TD_KEY_12 }}
          TD_KEY_13: ${{ secrets.TD_KEY_13 }}
          TD_KEY_14: ${{ secrets.TD_KEY_14 }}
          TD_KEY_15: ${{ secrets.TD_KEY_15 }}
          TD_KEY_16: ${{ secrets.TD_KEY_16 }}
          TIINGO_KEY_1: ${{ secrets.TIINGO_KEY_1 }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          ALPHA_VANTAGE_KEYS: ${{ secrets.ALPHA_VANTAGE_KEYS }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node core/scanner.js

      # Step 2: Background Sync Worker
      - name: Run Background Worker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TD_KEY_1: ${{ secrets.TD_KEY_1 }}
          TD_KEY_2: ${{ secrets.TD_KEY_2 }}
          TD_KEY_3: ${{ secrets.TD_KEY_3 }}
          TD_KEY_4: ${{ secrets.TD_KEY_4 }}
          TD_KEY_5: ${{ secrets.TD_KEY_5 }}
          TD_KEY_6: ${{ secrets.TD_KEY_6 }}
          TD_KEY_7: ${{ secrets.TD_KEY_7 }}
          TD_KEY_8: ${{ secrets.TD_KEY_8 }}
          TD_KEY_9: ${{ secrets.TD_KEY_9 }}
          TD_KEY_10: ${{ secrets.TD_KEY_10 }}
          TD_KEY_11: ${{ secrets.TD_KEY_11 }}
          TD_KEY_12: ${{ secrets.TD_KEY_12 }}
          TD_KEY_13: ${{ secrets.TD_KEY_13 }}
          TD_KEY_14: ${{ secrets.TD_KEY_14 }}
          TD_KEY_15: ${{ secrets.TD_KEY_15 }}
          TD_KEY_16: ${{ secrets.TD_KEY_16 }}
          TIINGO_KEY_1: ${{ secrets.TIINGO_KEY_1 }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          ALPHA_VANTAGE_KEYS: ${{ secrets.ALPHA_VANTAGE_KEYS }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node worker.js

      # Step 3: Crypto News Alert
      - name: Run Crypto News Alert
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node services/cryptoNewsAlert.js
