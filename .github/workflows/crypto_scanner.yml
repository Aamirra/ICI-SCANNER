name: Crypto Scanner Job

on:
  schedule:
    - cron: '0 */2 * * *' # Har 2 ghante baad
  workflow_dispatch:

jobs:
  run-crypto-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Crypto Scan
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node -e "require('./services/cryptoScanner').runCryptoScan().then(() => process.exit(0)).catch(err => { console.error(err); process.exit(1); })"
