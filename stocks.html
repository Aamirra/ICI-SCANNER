<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICI Stocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        /* ── Dark & Light Mode ── */
        [data-theme="dark"] {
            --bg:#020812; --sf:#080f1e; --sf2:#0d1828;
            --brd:rgba(255,255,255,0.08); --acc:#00aaff;
            --gold:#ffcc00; --txt:#dce8f5;
            --topbar-bg:linear-gradient(135deg,#0d1f42,#071228);
            --topbar-brd:rgba(0,170,255,0.2);
            --sc-brd:#333; --cloud-color:#00ff88;
            --all-color:#fff; --toggle-icon:"☀️";
            --nav-btn-bg:rgba(255,255,255,0.1); --nav-btn-color:#fff;
            --close-color:#ff4466;
            --chart-header:#0d1828; --chart-brd:#333;
            --brand-color:#fff;
        }
        [data-theme="light"] {
            --bg:#f0f4f8; --sf:#ffffff; --sf2:#e8eef5;
            --brd:rgba(0,0,0,0.1); --acc:#0077cc;
            --gold:#cc9900; --txt:#1a2a3a;
            --topbar-bg:linear-gradient(135deg,#c8dff5,#a0c4e8);
            --topbar-brd:rgba(0,119,204,0.3);
            --sc-brd:#ccd6e0; --cloud-color:#00aa55;
            --all-color:#1a2a3a; --toggle-icon:"🌙";
            --nav-btn-bg:rgba(0,0,0,0.1); --nav-btn-color:#1a2a3a;
            --close-color:#cc2233;
            --chart-header:#c8dff5; --chart-brd:#aac4dc;
            --brand-color:#0a1a2e;
        }

        body {
            background: var(--bg);
            margin:0;
            font-family:'JetBrains Mono',monospace;
            color:var(--txt);
            min-height:100vh;
            transition: background 0.3s, color 0.3s;
        }
        .wrap { max-width:580px; margin:0 auto; padding:12px; }
        .topbar {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px; background:var(--topbar-bg); border-radius:16px;
            margin-bottom:12px; border:1px solid var(--topbar-brd);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .brand { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:#fff; }

        .scan-btn, .theme-btn, .desktop-btn, .nav-btn, .psx-btn {
            background:rgba(0,170,255,0.15); color:var(--acc);
            border:1px solid var(--acc); padding:6px 12px;
            border-radius:8px; cursor:pointer; font-size:10px;
            font-family:'JetBrains Mono',monospace; font-weight:bold;
            transition: all 0.2s; text-decoration:none;
        }
        .psx-btn.active { background:rgba(0,170,255,0.35); color:#fff; }
        .scan-btn:hover, .theme-btn:hover, .desktop-btn:hover, .nav-btn:hover, .psx-btn:hover {
            background:rgba(0,170,255,0.25); transform: scale(1.05);
        }

        .sum { display: flex; gap: 8px; margin-bottom: 12px; }
        .sc {
            flex:1; padding: 12px; border-radius: 14px;
            border:1px solid var(--sc-brd); text-align:center;
            cursor:pointer; background: var(--sf);
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .sc:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(0,170,255,0.25); }
        .sn { font-size:20px; display:block; font-weight:bold; }

        .tw {
            background:var(--sf); border-radius:16px;
            border:1px solid var(--brd); overflow-x: auto; overflow-y: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        /* Column widths for 11 columns */
        th:nth-child(1) { width: 11%; }  /* Symbol */
        th:nth-child(2) { width: 5%; }   /* 1H */
        th:nth-child(3) { width: 5%; }   /* 4H */
        th:nth-child(4) { width: 5%; }   /* 1D */
        th:nth-child(5) { width: 5%; }   /* 1W */
        th:nth-child(6) { width: 7%; }   /* Price */
        th:nth-child(7) { width: 13%; }  /* 200 Candle Change */
        th:nth-child(8) { width: 14%; }  /* 10 Candle Change (1D) */
        th:nth-child(9) { width: 9%; }   /* 1H Mom */
        th:nth-child(10) { width: 10%; } /* Vol 7D */
        th:nth-child(11) { width: 16%; } /* Dollar Vol */

        th {
            padding: 6px 4px;
            font-size: 9px;
            color: var(--acc);
            border-bottom: 1px solid var(--th-brd);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        td {
            padding: 4px 4px;
            text-align: center;
            border-bottom: 1px solid var(--brd);
            font-size: 9px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pn { font-family:'Syne',sans-serif; font-weight:700; font-size:12px; text-align:left; padding-left:8px; color:var(--acc); cursor:pointer; }
        .green { color:#00cc66; }
        .red { color:#ff2244; }

        .sig {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; position: relative; border: none;
            background: #555;
        }
        .sig.bull { background: #00cc66; }
        .sig.bear { background: #ff2244; }

        .pn.blink-pair-bull {
            animation: blinkBull 1.5s infinite;
            background: rgba(0,204,102,0.15);
        }
        .pn.blink-pair-bear {
            animation: blinkBear 1.5s infinite;
            background: rgba(255,34,68,0.15);
        }
        @keyframes blinkBull {
            0%, 100% { color: #00cc66; text-shadow: 0 0 10px #00cc66; }
            50% { color: #004d1a; text-shadow: 0 0 5px #00cc66; }
        }
        @keyframes blinkBear {
            0%, 100% { color: #ff2244; text-shadow: 0 0 10px #ff2244; }
            50% { color: #4d0000; text-shadow: 0 0 5px #ff2244; }
        }

        /* ✅ Selected row highlight */
        tr.selected-row {
            background: rgba(255,215,0,0.15) !important;
            border: 1px solid #FFD700;
        }

        /* Desktop mode */
        body.desktop-mode { display:flex; height:100vh; overflow:hidden; }
        body.desktop-mode .wrap {
            max-width:none; margin:0; padding:10px;
            flex-shrink:0; width:620px; overflow-y:auto;
            border-right:1px solid var(--brd);
        }
        body.desktop-mode .tw { overflow:visible; }
        body.desktop-mode table { min-width:0; }

        .modal {
            position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:500;
            display:none; align-items:flex-end; justify-content:center;
            backdrop-filter: blur(3px);
        }
        .modal.open { display:flex; }
        .m-card {
            background:var(--sf2); border:1px solid var(--brd); border-radius:24px 24px 0 0;
            width:100%; max-width:400px; padding:22px; color:var(--txt);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
            max-height: 80vh; display: flex; flex-direction: column;
        }
        #targetListContent { overflow-y: auto; flex: 1; padding-right: 8px; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Chart overlay (desktop: relative inside sidebar, mobile: fixed) */
        #chartOverlay {
            position:fixed; inset:0; background:var(--bg); z-index:4000;
            display:none; flex-direction:column;
            animation: slideUp 0.3s ease;
        }
        body.desktop-mode #chartOverlay {
            position: relative !important; inset: auto !important;
            flex: 1; height: 100vh;
            display: flex !important; flex-direction: column; z-index: 1 !important;
        }
        body.desktop-mode #tv_chart_container { min-height: 0; }
        body.desktop-mode #chartCloseBtn { display: none !important; }
        body.desktop-mode #tv_chart_container:empty {
            display: flex !important; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        }
        body.desktop-mode #tv_chart_container:empty::before { content:'📊'; font-size:44px; opacity:0.2; }
        body.desktop-mode #tv_chart_container:empty::after {
            content:'Select a pair to view chart'; font-family:'JetBrains Mono',monospace;
            font-size:12px; color:var(--txt); opacity:0.3;
        }

        .nav-btn {
            background:var(--nav-btn-bg); color:var(--nav-btn-color);
            border:none; padding:8px 15px; border-radius:8px;
            cursor:pointer; font-weight:bold; transition: transform 0.2s;
            margin:0 4px;
        }
        .nav-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div class="brand">ICI STOCKS</div>
        <div style="display:flex; align-items:center; gap:8px;">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
            <button class="desktop-btn" onclick="toggleDesktopMode()" id="desktopBtn" title="Desktop Mode">🖥️</button>
            <button class="scan-btn" onclick="manualScan()">🔄 SCAN</button>
            <button class="psx-btn active" id="exnessBtn" onclick="setMarket('exness')">💹 Exness</button>
            <button class="psx-btn" id="psxBtn" onclick="setMarket('psx')">🇵🇰 PSX</button>
            <button class="nav-btn" onclick="openTargetList()">👁 Target</button>
            <a href="/" class="nav-btn">🔙 Main</a>
        </div>
    </div>

    <div class="sum">
        <div class="sc" style="color:#00cc66" onclick="setFilter('bull')">
            <span class="sn" id="bc">0</span>BULL
        </div>
        <div class="sc" style="color:#ff2244" onclick="setFilter('bear')">
            <span class="sn" id="rc">0</span>BEAR
        </div>
        <div class="sc" style="color:var(--all-color)" onclick="setFilter('all')">
            <span class="sn" id="allCount">0</span>ALL
        </div>
    </div>

    <div class="tw">
        <table>
            <thead>
                <tr>
                    <th style="text-align:left;padding-left:8px">Symbol</th>
                    <th>1H</th><th>4H</th><th>1D</th><th>1W</th>
                    <th>Price</th>
                    <th>200 Candle Change</th>
                    <th>10 Candle Change (1D)</th>
                    <th>1H Mom</th>
                    <th>Vol 7D</th>
                    <th>Dollar Vol</th>
                </tr>
            </thead>
            <tbody id="tb"></tbody>
        </table>
    </div>
</div>

<!-- Target List Modal -->
<div class="modal" id="targetModal" onclick="this.classList.remove('open')">
    <div class="m-card" onclick="event.stopPropagation()">
        <h3 style="margin-top:0;margin-bottom:15px;color:var(--gold)">Target List</h3>
        <div id="targetListContent"></div>
    </div>
</div>

<!-- Chart Overlay -->
<div id="chartOverlay">
    <div style="padding:10px 15px; background:var(--chart-header); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--chart-brd);">
        <div style="display:flex; gap:12px; align-items:center">
            <button class="nav-btn" onclick="moveStockPair(-1)">❮</button>
            <span id="cp" style="color:var(--brand-color); font-weight:800; font-family:'Syne'; font-size:18px; min-width:80px; text-align:center">Stock</span>
            <button class="nav-btn" onclick="moveStockPair(1)">❯</button>
        </div>
        <span onclick="closeStockChart()" style="color:var(--close-color); font-size:14px; font-weight:800; cursor:pointer; padding:10px">✕ CLOSE</span>
    </div>
    <div id="tv_chart_container" style="flex:1"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const firebaseConfig = {
        databaseURL: "https://fatima-16b38-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentMarket = 'exness';
    let stockData = {};
    let stockPbState = {};
    let currentFilter = 'all';
    let stockChartPairs = [];
    let stockCIdx = 0;
    let selectedStockSymbol = null;   // ✅ for row highlight

    function attachListeners() {
        db.ref('stockMarketData').off();
        db.ref('stockMarketDataPbState').off();
        db.ref('psxStockMarketData').off();
        db.ref('psxStockMarketDataPbState').off();

        if (currentMarket === 'exness') {
            db.ref('stockMarketData').on('value', snap => {
                stockData = snap.val() || {};
                render();
                updateCounts();
            });
            db.ref('stockMarketDataPbState').on('value', snap => {
                stockPbState = snap.val() || {};
            });
        } else {
            db.ref('psxStockMarketData').on('value', snap => {
                stockData = snap.val() || {};
                render();
                updateCounts();
            });
            db.ref('psxStockMarketDataPbState').on('value', snap => {
                stockPbState = snap.val() || {};
            });
        }
    }

    function setMarket(market) {
        currentMarket = market;
        document.getElementById('exnessBtn').classList.toggle('active', market === 'exness');
        document.getElementById('psxBtn').classList.toggle('active', market === 'psx');
        currentFilter = 'all';
        stockChartPairs = [];
        stockPbState = {};
        selectedStockSymbol = null;
        attachListeners();
    }

    function openStockChartFromTable(symbol) {
        selectedStockSymbol = symbol;         // ✅ highlight
        const filtered = getFilteredStocks();
        stockChartPairs = filtered.map(([sym, data]) => sym);
        stockCIdx = stockChartPairs.indexOf(symbol);
        if (stockCIdx === -1) stockCIdx = 0;
        openStockChart(stockCIdx);
    }

    function openStockChart(idx) {
        stockCIdx = idx;
        const symbol = stockChartPairs[idx];
        if (!symbol) return;
        document.getElementById('cp').textContent = symbol;
        document.getElementById('chartOverlay').style.display = 'flex';
        document.getElementById('tv_chart_container').innerHTML = '';
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "60",
            "theme": getTheme(),
            "container_id": "tv_chart_container",
            "studies_overrides": {
                "moving average exponential.plot.color": "#2962FF",
                "moving average exponential.plot.linewidth": 1,
                "moving average.plot.color": "#9E9E9E",
                "moving average.plot.linewidth": 1
            },
            "overrides": { "scalesProperties.showStudyLastValue": false },
            "studies": [
                { "id": "MAExp@tv-basicstudies", "inputs": { "length": 10 }, "overrides": { "Plot.color": "#2962FF", "Plot.linewidth": 1, "Plot.visible": true } },
                { "id": "MAExp@tv-basicstudies", "inputs": { "length": 20 }, "overrides": { "Plot.color": "#F44336", "Plot.linewidth": 1, "Plot.visible": true } },
                { "id": "MASimple@tv-basicstudies", "inputs": { "length": 50 }, "overrides": { "Plot.color": "#9E9E9E", "Plot.linewidth": 1, "Plot.visible": true } },
                { "id": "WilliamFractal@tv-basicstudies" }
            ]
        });
        // Re-apply highlight after render
        setTimeout(highlightSelectedRow, 100);
    }

    function moveStockPair(step) {
        const newIdx = stockCIdx + step;
        if (newIdx >= 0 && newIdx < stockChartPairs.length) {
            selectedStockSymbol = stockChartPairs[newIdx];
            openStockChart(newIdx);
        }
    }

    function closeStockChart() {
        document.getElementById('chartOverlay').style.display = 'none';
        document.getElementById('tv_chart_container').innerHTML = '';
        selectedStockSymbol = null;
        highlightSelectedRow();  // remove highlights
    }

    function getTheme() {
        return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    }

    function isStrongTrend(symbol, data, direction) {
        if (!data) return false;
        return data.signal4h === direction && data.signal1d === direction && data.signal1w === direction;
    }

    function getFilteredStocks() {
        const entries = Object.entries(stockData).sort(([a],[b]) => a.localeCompare(b));
        if (currentFilter === 'all') return entries;
        return entries.filter(([sym, data]) => {
            if (currentFilter === 'bull') return isStrongTrend(sym, data, 'bull');
            if (currentFilter === 'bear') return isStrongTrend(sym, data, 'bear');
            return true;
        });
    }

    // ✅ Apply row highlight
    function highlightSelectedRow() {
        const rows = document.querySelectorAll('#tb tr');
        rows.forEach(row => {
            const pairCell = row.querySelector('.pn');
            if (pairCell) {
                const symbol = pairCell.textContent.trim();
                if (symbol === selectedStockSymbol) {
                    row.classList.add('selected-row');
                } else {
                    row.classList.remove('selected-row');
                }
            }
        });
    }

    function render() {
        const tbody = document.getElementById('tb');
        const filtered = getFilteredStocks();
        tbody.innerHTML = filtered.map(([symbol, data]) => {
            const price = data.price ? data.price.toFixed(2) : '—';
            const long = data.longTermTrend != null ? (data.longTermTrend > 0 ? '+' : '') + data.longTermTrend.toFixed(2) + '%' : '—';
            const longColor = data.longTermTrend >= 0 ? 'green' : 'red';
            const short = data.shortTermMomentum != null ? (data.shortTermMomentum > 0 ? '+' : '') + data.shortTermMomentum.toFixed(2) + '%' : '—';
            const shortColor = data.shortTermMomentum >= 0 ? 'green' : 'red';
            const micro = data.microMomentum != null ? (data.microMomentum > 0 ? '+' : '') + data.microMomentum.toFixed(2) + '%' : '—';
            const microColor = data.microMomentum >= 0 ? 'green' : 'red';
            const vol7d = data.volume7dAvg != null && data.volume7dAvg !== 0 ? data.volume7dAvg.toLocaleString() : '—';
            const dollarVol = data.dollarVolume1d && data.dollarVolume1d !== '0.00' ? data.dollarVolume1d : '—';

            const sig1h = data.signal1h || '';
            const sig4h = data.signal4h || '';
            const sig1d = data.signal1d || '';
            const sig1w = data.signal1w || '';

            const isBull = isStrongTrend(symbol, data, 'bull');
            const isBear = isStrongTrend(symbol, data, 'bear');
            const blinkClass = isBull ? 'blink-pair-bull' : (isBear ? 'blink-pair-bear' : '');

            // ✅ Apply selected-row class if this is the selected stock
            const selectedClass = (symbol === selectedStockSymbol) ? ' selected-row' : '';

            return `<tr class="${selectedClass}">
                <td class="pn ${blinkClass}" onclick="openStockChartFromTable('${symbol}')">${symbol}</td>
                <td><div class="sig ${sig1h}"></div></td>
                <td><div class="sig ${sig4h}"></div></td>
                <td><div class="sig ${sig1d}"></div></td>
                <td><div class="sig ${sig1w}"></div></td>
                <td>${price}</td>
                <td class="${longColor}">${long}</td>
                <td class="${shortColor}">${short}</td>
                <td class="${microColor}">${micro}</td>
                <td>${vol7d}</td>
                <td>${dollarVol}</td>
            </tr>`;
        }).join('');
        // Re-apply highlight after render
        setTimeout(highlightSelectedRow, 50);
    }

    function updateCounts() {
        let bullCount = 0, bearCount = 0;
        for (const [sym, data] of Object.entries(stockData)) {
            if (isStrongTrend(sym, data, 'bull')) bullCount++;
            if (isStrongTrend(sym, data, 'bear')) bearCount++;
        }
        document.getElementById('bc').textContent = bullCount;
        document.getElementById('rc').textContent = bearCount;
        document.getElementById('allCount').textContent = Object.keys(stockData).length;
    }

    function setFilter(f) { currentFilter = f; render(); }

    // ═══════════════════════════════════════════
    // TARGET LIST (with auto‑reopen)
    // ═══════════════════════════════════════════
    const TARGET_PHASES = ['pullback', 'mark_high', 'mark_low'];
    function openTargetList() {
        const targets = [];
        for (const [symbol, state] of Object.entries(stockPbState)) {
            if (state && TARGET_PHASES.includes(state.phase)) {
                targets.push({ symbol, dir: state.dir, phase: state.phase });
            }
        }
        const div = document.getElementById('targetListContent');
        div.innerHTML = (targets.length ? targets.map(t => {
                const dirCol = t.dir === 'bull' ? '#00ff88' : '#ff4466';
                const phaseLabel = t.phase === 'pullback' ? 'Pullback' : (t.phase === 'mark_high' || t.phase === 'mark_low') ? 'Ready — inside bar wait' : t.phase;
                return `<div style="padding:10px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;gap:8px">
                    <span style="color:var(--acc);font-weight:bold;cursor:pointer" onclick="openStockChartFromTarget('${t.symbol}')">${t.symbol}</span>
                    <span style="font-size:10px;color:#aaa">${phaseLabel}</span>
                    <span style="color:${dirCol};font-weight:bold">${t.dir.toUpperCase()}</span>
                </div>`;
            }).join('') : `<div style="color:#888;text-align:center;padding:20px">No active pullback setups</div>`);
        document.getElementById('targetModal').classList.add('open');
    }

    // ✅ From target list: open chart, then reopen target list
    function openStockChartFromTarget(symbol) {
        document.getElementById('targetModal').classList.remove('open');
        selectedStockSymbol = symbol;
        const filtered = getFilteredStocks();
        stockChartPairs = filtered.map(([sym, data]) => sym);
        stockCIdx = stockChartPairs.indexOf(symbol);
        if (stockCIdx === -1) stockCIdx = 0;
        openStockChart(stockCIdx);
        setTimeout(() => { openTargetList(); }, 400);
    }

    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
        localStorage.setItem('ici-stocks-theme', newTheme);
    }
    (function() {
        const saved = localStorage.getItem('ici-stocks-theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('themeBtn').textContent = saved === 'light' ? '🌙' : '☀️';
            });
        }
    })();

    function manualScan() {
        const btn = document.querySelector('.scan-btn');
        btn.textContent = '⏳ Scanning...'; btn.disabled = true;
        fetch('/scan')
            .then(() => {
                btn.textContent = '✅ Started!';
                setTimeout(() => { btn.textContent = '🔄 SCAN'; btn.disabled = false; }, 3000);
            })
            .catch(() => {
                btn.textContent = '❌ Error';
                setTimeout(() => { btn.textContent = '🔄 SCAN'; btn.disabled = false; }, 3000);
            });
    }

    function toggleDesktopMode() {
        const isDesktop = document.body.classList.toggle('desktop-mode');
        const btn = document.getElementById('desktopBtn');
        if (isDesktop) { btn.textContent = '📱'; btn.title = 'Switch to Mobile'; }
        else { btn.textContent = '🖥️'; btn.title = 'Switch to Desktop'; }
        localStorage.setItem('ici-stocks-desktop', isDesktop ? 'desktop' : 'mobile');
    }
    (function() {
        if (localStorage.getItem('ici-stocks-desktop') === 'desktop') {
            document.body.classList.add('desktop-mode');
            document.getElementById('desktopBtn').textContent = '📱';
        }
    })();

    attachListeners();
</script>
</body>
