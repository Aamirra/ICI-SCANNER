<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICI Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<style>
/* ── 3D Base Setup ── */
body {
  perspective: 1200px;
  overflow-x: hidden;
}
.wrap {
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
}

/* ── Dark & Light Mode (same as before) ── */
[data-theme="dark"] {
  --bg:#020812; --sf:#080f1e; --sf2:#0d1828;
  --brd:rgba(255,255,255,0.08); --acc:#00aaff;
  --gold:#ffcc00; --txt:#dce8f5;
  --topbar-bg:linear-gradient(135deg,#0d1f42,#071228);
  --topbar-brd:rgba(0,170,255,0.2);
  --sc-brd:#333; --th-brd:rgba(255,255,255,0.08);
  --modal-bg:rgba(0,0,0,0.9);
  --brand-color:#fff;
  --cloud-color:#00ff88;
  --all-color:#fff;
  --nav-btn-bg:rgba(255,255,255,0.1); --nav-btn-color:#fff;
  --close-color:#ff4466;
  --chart-header:#0d1828; --chart-brd:#333;
  --toggle-icon:"☀️";
  --sent-nodata:#555;
}
[data-theme="light"] {
  --bg:#f0f4f8; --sf:#ffffff; --sf2:#e8eef5;
  --brd:rgba(0,0,0,0.1); --acc:#0077cc;
  --gold:#cc9900; --txt:#1a2a3a;
  --topbar-bg:linear-gradient(135deg,#c8dff5,#a0c4e8);
  --topbar-brd:rgba(0,119,204,0.3);
  --sc-brd:#ccd6e0; --th-brd:rgba(0,0,0,0.08);
  --modal-bg:rgba(0,0,0,0.6);
  --brand-color:#0a1a2e;
  --cloud-color:#00aa55;
  --all-color:#1a2a3a;
  --nav-btn-bg:rgba(0,0,0,0.1); --nav-btn-color:#1a2a3a;
  --close-color:#cc2233;
  --chart-header:#c8dff5; --chart-brd:#aac4dc;
  --toggle-icon:"🌙";
  --sent-nodata:#aaa;
}

/* ── Animated Background ── */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 50% 50%, var(--acc)22, transparent 70%);
  opacity: 0.05;
  z-index: -1;
  animation: bgPulse 8s infinite alternate;
}
@keyframes bgPulse {
  0% { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.2) rotate(5deg); }
}

/* Floating particles */
.particle {
  position: fixed;
  width: 2px;
  height: 2px;
  background: var(--acc);
  border-radius: 50%;
  opacity: 0.3;
  z-index: -1;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--txt); font-family:'JetBrains Mono',monospace; min-height:100vh; overflow-x:hidden; transition:background 0.3s, color 0.3s; }
.wrap { max-width:480px; margin:0 auto; padding:12px; }

/* ── 3D Topbar ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px; background:var(--topbar-bg); border-radius:16px;
  margin-bottom:12px; border:1px solid var(--topbar-brd);
  transform-style: preserve-3d;
  transition: transform 0.15s ease, box-shadow 0.3s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.topbar:hover {
  transform: translateZ(10px);
  box-shadow: 0 10px 30px rgba(0,170,255,0.15);
}
.brand { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--brand-color); }
.scan-btn {
  background:rgba(0,170,255,0.15); color:var(--acc);
  border:1px solid var(--acc); padding:6px 12px;
  border-radius:8px; cursor:pointer; font-size:10px;
  font-family:'JetBrains Mono',monospace; font-weight:bold;
  transition: all 0.2s;
}
.scan-btn:hover {
  background:rgba(0,170,255,0.25);
  transform: scale(1.05);
}
.scan-btn:active {
  transform: scale(0.95) rotate(-3deg);
}
.theme-btn, .desktop-btn {
  background:none; border:1px solid var(--brd); border-radius:8px;
  padding:5px 9px; cursor:pointer; font-size:14px; line-height:1;
  transition: transform 0.2s;
}
.theme-btn:hover, .desktop-btn:hover { transform: scale(1.1); }

/* ── 3D Cards (BULL, BEAR, ALL) ── */
.sc {
  flex:1; padding:12px; border-radius:14px;
  border:1px solid var(--sc-brd); text-align:center;
  cursor:pointer; background:var(--sf);
  transform-style: preserve-3d;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.sc:hover {
  transform: translateY(-5px) translateZ(15px);
  box-shadow: 0 15px 25px rgba(0,0,0,0.4);
}
.sc:active {
  transform: translateY(2px) translateZ(5px);
  box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}
.sn { font-size:20px; display:block; font-weight:bold; }

/* ── Table with depth ── */
.tw {
  background:var(--sf); border-radius:16px;
  border:1px solid var(--brd); overflow:hidden;
  transform-style: preserve-3d;
  transition: transform 0.2s;
}
.tw:hover { transform: translateZ(5px); }
table { width:100%; border-collapse:collapse; }
th { padding:12px 6px; font-size:9px; color:var(--acc); border-bottom:1px solid var(--th-brd); }
td { padding:10px 6px; text-align:center; border-bottom:1px solid var(--brd); transition: background 0.2s; }
tr { transition: transform 0.2s; }
tr:hover {
  background: rgba(255,255,255,0.02);
  transform: scale(1.01) translateZ(5px);
}
.pn { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; text-align:left; padding-left:12px; color:var(--acc); cursor:pointer; }

/* Signal dots with pulse */
.sig {
  display:inline-block; width:14px; height:14px; border-radius:4px;
  border:none; animation: pulse 2s infinite;
}
.sig.bull { background:#00cc66; box-shadow: 0 0 8px #00cc66; }
.sig.bear { background:#ff2244; box-shadow: 0 0 8px #ff2244; }
@keyframes pulse {
  0% { box-shadow: 0 0 4px; }
  50% { box-shadow: 0 0 12px; }
  100% { box-shadow: 0 0 4px; }
}

/* Sentiment bar with shimmer */
.sentiment-bar {
  display:flex; height:22px; border-radius:5px; overflow:hidden;
  width:100%; min-width:80px; box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
}
.s-bear {
  background:#ff2244; box-shadow:0 0 6px #ff2244;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:7.5px; font-weight:bold;
  white-space:nowrap; overflow:hidden; flex-shrink:0;
  transition: width 0.4s ease;
  position: relative;
}
.s-bull {
  background:#00cc66; box-shadow:0 0 6px #00cc66;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:7.5px; font-weight:bold;
  white-space:nowrap; overflow:hidden; flex-shrink:0;
  transition: width 0.4s ease;
  position: relative;
}
.s-bear::after, .s-bull::after {
  content: '';
  position: absolute; top:0; left:-50%; width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0% { left: -50%; }
  100% { left: 150%; }
}

/* Modal 3D pop */
.modal {
  position:fixed; inset:0; background:var(--modal-bg); z-index:3000;
  display:none; align-items:center; justify-content:center; padding:20px;
  backdrop-filter: blur(4px);
}
.modal.open { display:flex; }
.m-card {
  background:var(--sf2); border:1px solid var(--brd); border-radius:24px;
  width:100%; max-width:400px; padding:22px; color:var(--txt);
  transform: translateZ(30px); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  animation: cardPop 0.3s ease;
}
@keyframes cardPop {
  0% { transform: translateZ(-30px) scale(0.9); opacity:0; }
  100% { transform: translateZ(0) scale(1); opacity:1; }
}

/* Chart overlay with slide */
#chartOverlay {
  position:fixed; inset:0; background:var(--bg); z-index:4000;
  display:none; flex-direction:column;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

/* Nav buttons */
.nav-btn {
  background:var(--nav-btn-bg); color:var(--nav-btn-color);
  border:none; padding:8px 15px; border-radius:8px;
  cursor:pointer; font-weight:bold; transition: transform 0.2s;
}
.nav-btn:hover { transform: scale(1.1); }

/* Desktop mode adjustments (as before) */
body.desktop-mode { display:flex; height:100vh; overflow:hidden; }
body.desktop-mode .wrap { width:420px; min-width:320px; max-width:420px; height:100vh; overflow-y:auto; padding:10px; flex-shrink:0; margin:0; border-right:1px solid var(--brd); }
body.desktop-mode #chartOverlay { position:relative !important; inset:auto !important; flex:1; height:100vh; display:flex !important; flex-direction:column; z-index:1 !important; }
body.desktop-mode #tv_chart_container { min-height:0; }
body.desktop-mode #chartCloseBtn { display:none !important; }
body.desktop-mode #tv_chart_container:empty { display:flex !important; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
body.desktop-mode #tv_chart_container:empty::before { content:'📊'; font-size:44px; opacity:0.2; }
body.desktop-mode #tv_chart_container:empty::after { content:'Select a pair to view chart'; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--txt); opacity:0.3; }
</style>
</head>
<body>
<!-- Floating particles will be added by JS -->
<div class="wrap" id="mainWrap">
  <div class="topbar" id="topbar">
    <div class="brand">ICI <span>SCREENER</span></div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <button class="desktop-btn" onclick="toggleDesktopMode()" id="desktopBtn" title="Desktop Mode">🖥️</button>
      <button class="scan-btn" onclick="manualScan()">🔄 SCAN</button>
      <div style="font-size:10px; color:var(--cloud-color)">CLOUD ACTIVE</div>
    </div>
  </div>
  <div class="sbar" onclick="openM()"><span id="st">Connecting...</span><span id="pb" style="color:var(--gold)">👁 Target List ❯</span></div>
  <div class="sum">
    <div class="sc" style="color:#00cc66" onclick="setFilter('bull')"><span class="sn" id="bc">0</span>BULL</div>
    <div class="sc" style="color:#ff2244" onclick="setFilter('bear')"><span class="sn" id="rc">0</span>BEAR</div>
    <div class="sc" style="color:var(--all-color)" onclick="setFilter('all')"><span class="sn">36</span>ALL</div>
  </div>
  <div class="tw">
    <table>
      <thead>
        <tr>
          <th style="text-align:left;padding-left:12px">Pair</th>
          <th>1H</th>
          <th>4H</th>
          <th>1D</th>
          <th>1W</th>
          <th class="sent-th">Daily Sentiment</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>
<div class="modal" id="mo" onclick="this.classList.remove('open')"><div class="m-card" onclick="event.stopPropagation()"><div id="ml"></div></div></div>
<div id="chartOverlay">
  <div style="padding:10px 15px; background:var(--chart-header); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--chart-brd);">
    <div style="display:flex; gap:12px; align-items:center">
      <button class="nav-btn" onclick="movePair(-1)">❮</button>
      <span id="cp" style="color:var(--brand-color); font-weight:800; font-family:'Syne'; font-size:18px; min-width:80px; text-align:center">Pair</span>
      <button class="nav-btn" onclick="movePair(1)">❯</button>
    </div>
    <span id="chartCloseBtn" onclick="closeC()" style="color:var(--close-color); font-size:14px; font-weight:800; cursor:pointer; padding:10px">✕ CLOSE</span>
  </div>
  <div id="tv_chart_container" style="flex:1"></div>
</div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script src="js/firebase.js"></script>
<script src="Alerts.js"></script>
<script src="js/render.js"></script>
<script src="js/chart.js"></script>
<script src="js/modal.js"></script>
<script>
// ── Theme Toggle ──
function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
    localStorage.setItem('ici-theme', newTheme);
}
(function() {
    const saved = localStorage.getItem('ici-theme');
    if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('themeBtn');
            if (btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
        });
    }
})();

function manualScan() {
    const btn = document.querySelector('.scan-btn');
    btn.textContent = '⏳ Scanning...';
    btn.disabled = true;
    btn.style.animation = 'rotate360 1s linear infinite';
    fetch('/scan')
        .then(() => {
            btn.textContent = '✅ Started!';
            btn.style.animation = '';
            setTimeout(() => {
                btn.textContent = '🔄 SCAN';
                btn.disabled = false;
            }, 3000);
        })
        .catch(() => {
            btn.textContent = '❌ Error';
            btn.style.animation = '';
            setTimeout(() => {
                btn.textContent = '🔄 SCAN';
                btn.disabled = false;
            }, 3000);
        });
}
// Add rotate animation
const styleSheet = document.createElement("style");
styleSheet.textContent = "@keyframes rotate360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }";
document.head.appendChild(styleSheet);

window.addEventListener('load', function() {
    setTimeout(function() {
        if (document.getElementById('st').textContent === 'Connecting...') {
            location.reload();
        }
    }, 5000);
});

// ════════════════════════════════════════
// 3D Mouse Parallax Effect
// ════════════════════════════════════════
const wrap = document.getElementById('mainWrap');
document.addEventListener('mousemove', (e) => {
  const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
  const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
  wrap.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});
// Reset on mouse leave
wrap.addEventListener('mouseleave', () => {
  wrap.style.transform = 'rotateY(0deg) rotateX(0deg)';
});

// Floating particles
function createParticles() {
  const particleContainer = document.createElement('div');
  particleContainer.style.position = 'fixed';
  particleContainer.style.top = 0;
  particleContainer.style.left = 0;
  particleContainer.style.width = '100%';
  particleContainer.style.height = '100%';
  particleContainer.style.pointerEvents = 'none';
  particleContainer.style.zIndex = '-1';
  document.body.appendChild(particleContainer);
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
    particle.style.animationDelay = (Math.random() * 10) + 's';
    particleContainer.appendChild(particle);
  }
}
createParticles();

// Desktop Mode Logic
function toggleDesktopMode() {
    const isDesktop = document.body.classList.toggle('desktop-mode');
    const overlay  = document.getElementById('chartOverlay');
    const btn      = document.getElementById('desktopBtn');
    if (isDesktop) {
        overlay.style.display = 'flex';
        btn.textContent = '📱';
        btn.title = 'Switch to Mobile';
    } else {
        overlay.style.display = 'none';
        btn.textContent = '🖥️';
        btn.title = 'Switch to Desktop';
    }
    localStorage.setItem('ici-mode', isDesktop ? 'desktop' : 'mobile');
}
window.addEventListener('load', function() {
    if (typeof window.closeC === 'function') {
        const _origClose = window.closeC;
        window.closeC = function() {
            if (document.body.classList.contains('desktop-mode')) return;
            _origClose.apply(this, arguments);
        };
    }
    if (localStorage.getItem('ici-mode') === 'desktop') {
        document.body.classList.add('desktop-mode');
        document.getElementById('desktopBtn').textContent = '📱';
        document.getElementById('desktopBtn').title = 'Switch to Mobile';
        document.getElementById('chartOverlay').style.display = 'flex';
    }
});
</script>
</body>
</html>
