<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICI Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<style>
/* ── 3D Perspective wrapper ── */
#app-container {
  perspective: 1200px;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── Dark & Light Mode ── */
[data-theme="dark"] {
  --bg:#020812; --sf:#080f1e; --sf2:#0d1828;
  --brd:rgba(255,255,255,0.08); --acc:#00aaff;
  --gold:#ffcc00; --txt:#dce8f5;
  --topbar-bg:linear-gradient(135deg,#0d1f42,#071228);
  --topbar-brd:rgba(0,170,255,0.2);
  --sc-brd:#333; --th-brd:rgba(255,255,255,0.08);
  --modal-bg:rgba(0,0,0,0.9);
  --brand-color:#fff;
  --cloud-color:#00ff88;
  --all-color:#fff;
  --nav-btn-bg:rgba(255,255,255,0.1); --nav-btn-color:#fff;
  --close-color:#ff4466;
  --chart-header:#0d1828; --chart-brd:#333;
  --toggle-icon:"☀️";
  --sent-nodata:#555;
}
[data-theme="light"] {
  --bg:#f0f4f8; --sf:#ffffff; --sf2:#e8eef5;
  --brd:rgba(0,0,0,0.1); --acc:#0077cc;
  --gold:#cc9900; --txt:#1a2a3a;
  --topbar-bg:linear-gradient(135deg,#c8dff5,#a0c4e8);
  --topbar-brd:rgba(0,119,204,0.3);
  --sc-brd:#ccd6e0; --th-brd:rgba(0,0,0,0.08);
  --modal-bg:rgba(0,0,0,0.6);
  --brand-color:#0a1a2e;
  --cloud-color:#00aa55;
  --all-color:#1a2a3a;
  --nav-btn-bg:rgba(0,0,0,0.1); --nav-btn-color:#1a2a3a;
  --close-color:#cc2233;
  --chart-header:#c8dff5; --chart-brd:#aac4dc;
  --toggle-icon:"🌙";
  --sent-nodata:#aaa;
}

/* ── Animated Background ── */
body {
  background: var(--bg);
  margin:0;
  overflow-x: hidden;
  min-height: 100vh;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 50% 50%, var(--acc)22, transparent 70%);
  opacity: 0.05;
  z-index: -1;
  animation: bgPulse 8s infinite alternate;
}
@keyframes bgPulse {
  0% { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.2) rotate(5deg); }
}

/* Floating particles */
.particle {
  position: fixed;
  width: 2px; height: 2px;
  background: var(--acc);
  border-radius: 50%;
  opacity: 0.3;
  z-index: -1;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

* { margin:0; padding:0; box-sizing:border-box; }
body { color:var(--txt); font-family:'JetBrains Mono',monospace; }

/* ── WRAPPER ── */
.wrap {
  max-width: 480px;
  margin: 0 auto;
  padding: 12px;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
}

/* ── Topbar ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px; background:var(--topbar-bg); border-radius:16px;
  margin-bottom:12px; border:1px solid var(--topbar-brd);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.brand {
  font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--brand-color);
  animation: textGlow 2s ease-in-out infinite alternate;
}
@keyframes textGlow {
  0% { text-shadow: 0 0 5px var(--acc); }
  100% { text-shadow: 0 0 15px var(--acc), 0 0 25px var(--acc); }
}
.scan-btn {
  background:rgba(0,170,255,0.15); color:var(--acc);
  border:1px solid var(--acc); padding:6px 12px;
  border-radius:8px; cursor:pointer; font-size:10px;
  font-family:'JetBrains Mono',monospace; font-weight:bold;
  transition: all 0.2s;
}
.scan-btn:hover { background:rgba(0,170,255,0.25); transform: scale(1.05); }
.scan-btn:active { transform: scale(0.95); }
.theme-btn, .desktop-btn {
  background:none; border:1px solid var(--brd); border-radius:8px;
  padding:5px 9px; cursor:pointer; font-size:14px; line-height:1;
  transition: transform 0.2s;
}
.theme-btn:hover, .desktop-btn:hover { transform: scale(1.1); }

/* Summary Cards */
.sum { display: flex; gap: 8px; margin-bottom: 12px; }
.sc {
  flex:1; padding: 12px; border-radius: 14px;
  border:1px solid var(--sc-brd); text-align:center;
  cursor:pointer; background: var(--sf);
  transition: all 0.2s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  animation: cardPulse 3s ease-in-out infinite;
}
@keyframes cardPulse {
  0%, 100% { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  50% { box-shadow: 0 0 15px rgba(0,170,255,0.15); }
}
.sc:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(0,170,255,0.25); }
.sn { font-size:20px; display:block; font-weight:bold; }

/* ── TABLE CONTAINER ── */
.tw {
  background:var(--sf); border-radius:16px;
  border:1px solid var(--brd); overflow:hidden;
  transform-style: preserve-3d; transition: transform 0.2s;
}
.tw:hover { transform: translateZ(5px); }

.table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── TABLE with dynamic column widths ── */
:root {
  --col0-width: 11%;
  --col1-width: 6%;
  --col2-width: 6%;
  --col3-width: 6%;
  --col4-width: 6%;
  --col5-width: 11%;
  --col6-width: 8%;
  --col7-width: 9%;
  --col8-width: 9%;
  --col9-width: 8%;
  --col10-width: 8%;
  --col11-width: 12%;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
  table-layout: fixed;
}

th:nth-child(1), td:nth-child(1) { width: var(--col0-width); }
th:nth-child(2), td:nth-child(2) { width: var(--col1-width); }
th:nth-child(3), td:nth-child(3) { width: var(--col2-width); }
th:nth-child(4), td:nth-child(4) { width: var(--col3-width); }
th:nth-child(5), td:nth-child(5) { width: var(--col4-width); }
th:nth-child(6), td:nth-child(6) { width: var(--col5-width); }
th:nth-child(7), td:nth-child(7) { width: var(--col6-width); }
th:nth-child(8), td:nth-child(8) { width: var(--col7-width); }
th:nth-child(9), td:nth-child(9) { width: var(--col8-width); }
th:nth-child(10), td:nth-child(10) { width: var(--col9-width); }
th:nth-child(11), td:nth-child(11) { width: var(--col10-width); }
th:nth-child(12), td:nth-child(12) { width: var(--col11-width); }

th {
  position: relative;
  padding: 6px 2px;
  font-size: 9px;
  color: var(--acc);
  border-bottom: 1px solid var(--th-brd);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

td {
  padding: 5px 2px;
  text-align: center;
  border-bottom: 1px solid var(--brd);
  transition: background 0.2s;
  font-size: 9px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

tr { transition: transform 0.2s; }
tr:hover { background: rgba(255,255,255,0.02); transform: scale(1.01) translateZ(5px); }
.pn {
  font-family:'Syne',sans-serif; font-weight:700; font-size: 12px;
  text-align:left; padding-left:6px; color:var(--acc); cursor:pointer;
}

/* ✅ Blinking strong trend pair name */
.pn.blink-pair-bull {
    animation: blinkBull 1.5s infinite;
    background: rgba(0,204,102,0.15);
}
.pn.blink-pair-bear {
    animation: blinkBear 1.5s infinite;
    background: rgba(255,34,68,0.15);
}

@keyframes blinkBull {
    0%, 100% { color: #00cc66; text-shadow: 0 0 10px #00cc66; }
    50% { color: #004d1a; text-shadow: 0 0 5px #00cc66; }
}

@keyframes blinkBear {
    0%, 100% { color: #ff2244; text-shadow: 0 0 10px #ff2244; }
    50% { color: #4d0000; text-shadow: 0 0 5px #ff2244; }
}

/* ✅ Golden highlight for Blink + Pullback combo */
tr.golden-highlight {
    border: 2px solid #FFD700 !important;
    box-shadow: 0 0 12px #FFD700, inset 0 0 10px rgba(255,215,0,0.2);
}

/* ✅ Selected row highlight */
tr.selected-row {
    background: rgba(255,215,0,0.15) !important;
    border: 1px solid #FFD700;
}

/* Minimal padding between sentiment & bell */
th:nth-child(6), td:nth-child(6) { padding-right: 2px; }
th:nth-child(7), td:nth-child(7) { padding-left: 2px; }

/* Resize handle */
.resize-handle {
  position: absolute;
  right: 0; top: 0;
  width: 8px; height: 100%;
  cursor: col-resize;
  z-index: 2;
  background: transparent;
}
.resize-handle:hover { background: rgba(255,255,255,0.15); }

/* Signal dots */
.sig {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; position: relative; border: none; background: #555;
}
.sig.bull { background: #00cc66; }
.sig.bear { background: #ff2244; }
.sig::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 100%; height: 100%; border-radius: 50%;
  transform: translate(-50%, -50%); border: 2px solid transparent; opacity: 0;
  animation: ringPulse 2.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
.sig.bull::after { border-color: #00cc66; box-shadow: 0 0 6px #00cc66; }
.sig.bear::after { border-color: #ff2244; box-shadow: 0 0 6px #ff2244; }
@keyframes ringPulse {
  0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
  100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
}

/* Sentiment bar */
.sentiment-bar {
  display:flex; height:18px; border-radius:4px; overflow:hidden;
  width:100%; min-width:60px; box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
}
.s-bear, .s-bull {
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:7px; font-weight:bold;
  white-space:nowrap; overflow:hidden; flex-shrink:0;
  transition: width 0.4s ease; position: relative;
}
.s-bear { background:#ff2244; box-shadow:0 0 6px #ff2244; }
.s-bull { background:#00cc66; box-shadow:0 0 6px #00cc66; }
.s-bear::after, .s-bull::after {
  content: ''; position: absolute; top:0; left:-50%; width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { left: -50%; } 100% { left: 150%; } }

/* Tech cells */
.tech-cell { font-size: 9px; font-weight: 500; color: var(--txt); padding: 4px 2px; text-align: right; }

/* Alert cell – allow badge overflow */
.alert-cell {
  padding: 4px 2px;
  overflow: visible !important;
}

/* ── MODAL (Target List) ── */
.modal {
  position:fixed; inset:0; background:var(--modal-bg); z-index:3000;
  display:none; align-items:flex-end; justify-content:flex-start; padding:0;
  backdrop-filter: none;
}
.modal.open { display:flex; }
.m-card {
  background:var(--sf2); border:1px solid var(--brd); border-radius:24px;
  width:100%; max-width:400px; padding:22px; color:var(--txt);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  animation: cardPop 0.3s ease;
  margin: 10px;
}
@keyframes cardPop { 0% { transform: scale(0.9); opacity:0; } 100% { transform: scale(1); opacity:1; } }

/* Desktop mode – modal left side, no blur */
body.desktop-mode .modal {
  align-items: flex-start;
  justify-content: flex-start;
  padding: 10px;
}
body.desktop-mode .m-card {
  max-width: 380px;
  margin-left: 10px;
  border-radius: 24px;
  height: fit-content;
  max-height: 80vh;
}

/* Chart overlay */
#chartOverlay {
  position:fixed; inset:0; background:var(--bg); z-index:4000;
  display:none; flex-direction:column; animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.nav-btn {
  background:var(--nav-btn-bg); color:var(--nav-btn-color);
  border:none; padding:8px 15px; border-radius:8px;
  cursor:pointer; font-weight:bold; transition: transform 0.2s;
}
.nav-btn:hover { transform: scale(1.1); }

/* ── MOBILE FINE‑TUNING ── */
@media (max-width: 480px) {
  th { font-size: 7px; padding: 4px 1px; }
  td { font-size: 7px; padding: 4px 1px; }
  .pn { font-size: 10px; }
  .sig { width: 8px; height: 8px; }
  .sentiment-bar { height: 14px; min-width: 50px; }
  .s-bear, .s-bull { font-size: 6px; }
  .tech-cell { font-size: 8px; }
}

/* ── DESKTOP MODE (Optimized for spacing) ── */
body.desktop-mode { display:flex; height:100vh; overflow:hidden; }
body.desktop-mode #app-container {
  flex-shrink: 0;
  width: 620px; max-width: 620px;
  height: 100vh; overflow-y: auto;
  border-right: 1px solid var(--brd);
  perspective: none;
}
body.desktop-mode .wrap {
  max-width: none; margin: 0;
  padding: 12px 12px;
}
body.desktop-mode #chartOverlay {
  position: relative !important; inset: auto !important;
  flex: 1; height: 100vh;
  display: flex !important; flex-direction: column; z-index: 1 !important;
}
body.desktop-mode #tv_chart_container { min-height: 0; }
body.desktop-mode #chartCloseBtn { display: none !important; }
body.desktop-mode #tv_chart_container:empty {
  display: flex !important; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
}
body.desktop-mode #tv_chart_container:empty::before { content:'📊'; font-size:44px; opacity:0.2; }
body.desktop-mode #tv_chart_container:empty::after {
  content:'Select a pair to view chart'; font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--txt); opacity:0.3;
}

body.desktop-mode .table-wrap { overflow-x: visible; }
body.desktop-mode table {
  min-width: 0;
  width: 100%;
  table-layout: fixed;
  font-size: 9px;
}
body.desktop-mode th { padding: 4px 2px; font-size: 8px; }
body.desktop-mode td { padding: 3px 2px; font-size: 9px; }
body.desktop-mode .pn { font-size: 10px; }
body.desktop-mode .sig { width: 8px; height: 8px; }
body.desktop-mode .sentiment-bar { height: 14px; min-width: 55px; }
body.desktop-mode .s-bear, body.desktop-mode .s-bull { font-size: 6px; }
body.desktop-mode .tech-cell { font-size: 9px; }
</style>
</head>
<body>
<div id="app-container">
  <div class="wrap" id="mainWrap">
    <div class="topbar" id="topbar">
      <div class="brand">ICI <span>SCREENER</span></div>
      <div style="display:flex; align-items:center; gap:8px;">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
        <button class="desktop-btn" onclick="toggleDesktopMode()" id="desktopBtn" title="Desktop Mode">🖥️</button>
        <button class="scan-btn" onclick="manualScan()">🔄 SCAN</button>
        <a href="/stocks" class="theme-btn" style="text-decoration:none; font-size:14px;">📈 Stocks</a>
        <div style="font-size:10px; color:var(--cloud-color)">CLOUD ACTIVE</div>
        <!-- ✅ Crypto filter buttons -->
        <button class="theme-btn" style="background:rgba(0,170,255,0.15); color:var(--acc); border:1px solid var(--acc);" id="allBtn" onclick="setCryptoFilter(false)">🌐 All</button>
        <button class="theme-btn" style="background:rgba(255,255,255,0.1); color:#ffcc00; border:1px solid #ffcc00;" id="cryptoBtn" onclick="setCryptoFilter(true)">₿ Crypto</button>
      </div>
    </div>
    <div class="sbar" onclick="openM()"><span id="st">Connecting...</span><span id="pb" style="color:var(--gold)">👁 Target List ❯</span></div>
    <div class="sum">
      <div class="sc" style="color:#00cc66" onclick="setFilter('bull')"><span class="sn" id="bc">0</span>BULL</div>
      <div class="sc" style="color:#ff2244" onclick="setFilter('bear')"><span class="sn" id="rc">0</span>BEAR</div>
      <div class="sc" style="color:var(--all-color)" onclick="setFilter('all')"><span class="sn">36</span>ALL</div>
    </div>
    <div class="tw">
      <div class="table-wrap">
        <table id="mainTable">
          <thead>
            <tr>
              <th style="text-align:left;padding-left:6px">Pair</th>
              <th>1H</th><th>4H</th><th>1D</th><th>1W</th>
              <th>Sentiment</th>
              <th></th>
              <th>200 Candle Change</th>
              <th>10 Candle Change (1D)</th>
              <th>10 Candle Change (1H)</th>
              <th>Vol 7D</th>
              <th>Dollar Vol</th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="mo" onclick="this.classList.remove('open')"><div class="m-card" onclick="event.stopPropagation()"><div id="ml"></div></div></div>
<div id="chartOverlay">
  <div style="padding:10px 15px; background:var(--chart-header); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--chart-brd);">
    <div style="display:flex; gap:12px; align-items:center">
      <button class="nav-btn" onclick="movePair(-1)">❮</button>
      <span id="cp" style="color:var(--brand-color); font-weight:800; font-family:'Syne'; font-size:18px; min-width:80px; text-align:center">Pair</span>
      <button class="nav-btn" onclick="movePair(1)">❯</button>
    </div>
    <span id="chartCloseBtn" onclick="closeC()" style="color:var(--close-color); font-size:14px; font-weight:800; cursor:pointer; padding:10px">✕ CLOSE</span>
  </div>
  <div id="tv_chart_container" style="flex:1"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script src="js/firebase.js"></script>
<script src="Alerts.js"></script>
<script src="js/render.js"></script>
<script src="js/chart.js?v=11"></script>
<script>
// ═══════════════════════════════════════════
// COLUMN RESIZE ENGINE
// ═══════════════════════════════════════════
(function() {
  const STORAGE_KEY = 'ici_table_col_widths';
  const COLUMN_COUNT = 12;
  const MIN_WIDTH_PCT = 3;
  const MAX_WIDTH_PCT = 40;
  const defaultWidths = [11, 6, 6, 6, 6, 11, 8, 9, 9, 8, 8, 12];
  let colWidths = loadColWidths();

  function loadColWidths() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length === COLUMN_COUNT) return parsed;
      }
    } catch (e) {}
    return [...defaultWidths];
  }

  function saveColWidths() { localStorage.setItem(STORAGE_KEY, JSON.stringify(colWidths)); }

  function applyWidths() {
    const root = document.documentElement;
    for (let i = 0; i < COLUMN_COUNT; i++) root.style.setProperty(`--col${i}-width`, colWidths[i] + '%');
  }

  applyWidths();

  let dragState = null;

  function startResize(e, columnIndex) {
    e.preventDefault();
    const table = document.getElementById('mainTable');
    if (!table) return;
    const startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    const startWidth = table.offsetWidth * (colWidths[columnIndex] / 100);
    let neighborIndex = columnIndex < (COLUMN_COUNT - 1) ? columnIndex + 1 : columnIndex - 1;
    dragState = { columnIndex, neighborIndex, startX, startWidth, startNeighborWidth: table.offsetWidth * (colWidths[neighborIndex] / 100), tableWidth: table.offsetWidth };
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchmove', onDrag, { passive: false });
    document.addEventListener('touchend', stopDrag);
    document.body.style.userSelect = 'none';
  }

  function onDrag(e) {
    if (!dragState) return;
    e.preventDefault();
    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    const deltaX = clientX - dragState.startX;
    let newWidthPx = dragState.startWidth + deltaX;
    let newWidthPct = (newWidthPx / dragState.tableWidth) * 100;
    newWidthPct = Math.min(MAX_WIDTH_PCT, Math.max(MIN_WIDTH_PCT, newWidthPct));
    let oldTotalPct = colWidths[dragState.columnIndex] + colWidths[dragState.neighborIndex];
    let newNeighborPct = oldTotalPct - newWidthPct;
    newNeighborPct = Math.min(MAX_WIDTH_PCT, Math.max(MIN_WIDTH_PCT, newNeighborPct));
    if (newNeighborPct !== oldTotalPct - newWidthPct) {
      newWidthPct = oldTotalPct - newNeighborPct;
      newWidthPct = Math.min(MAX_WIDTH_PCT, Math.max(MIN_WIDTH_PCT, newWidthPct));
    }
    colWidths[dragState.columnIndex] = newWidthPct;
    colWidths[dragState.neighborIndex] = newNeighborPct;
    applyWidths();
  }

  function stopDrag() {
    if (!dragState) return;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', stopDrag);
    document.body.style.userSelect = '';
    saveColWidths();
    dragState = null;
  }

  function attachResizeHandles() {
    const headers = document.querySelectorAll('#mainTable thead th');
    headers.forEach((th, idx) => {
      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      handle.addEventListener('mousedown', (e) => startResize(e, idx));
      handle.addEventListener('touchstart', (e) => startResize(e, idx), { passive: false });
      th.appendChild(handle);
    });
  }
  attachResizeHandles();
})();
</script>
</body>
</html>
