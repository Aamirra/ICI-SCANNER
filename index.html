<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICI Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<style>
/* ══════════════════════════════════════
   THEME TOKENS
══════════════════════════════════════ */
[data-theme="dark"] {
  --bg:#131722; --s1:#1e222d; --s2:#2a2e39; --s3:#363a45;
  --brd:#2a2e39; --brd2:#363a45;
  --t1:#d1d4dc; --t2:#787b86; --t3:#4c525e;
  --bull:#26a69a; --bear:#ef5350; --acc:#2962ff;
  --bullbg:rgba(38,166,154,0.13); --bearbg:rgba(239,83,80,0.13);
  --topsh:none;
  --modal-bg:rgba(0,0,0,0.85);
  --chart-header:#1e222d; --chart-brd:#2a2e39;
  --nav-btn-bg:rgba(255,255,255,0.08); --nav-btn-color:#d1d4dc;
  --close-color:#ef5350;
  --cloud-color:#26a69a;
}
[data-theme="light"] {
  --bg:#f0f3fa; --s1:#ffffff; --s2:#f0f3fa; --s3:#e4e7f0;
  --brd:#e0e3eb; --brd2:#c8ccd8;
  --t1:#131722; --t2:#787b86; --t3:#9598a1;
  --bull:#26a69a; --bear:#ef5350; --acc:#2962ff;
  --bullbg:rgba(38,166,154,0.1); --bearbg:rgba(239,83,80,0.1);
  --topsh:0 1px 4px rgba(0,0,0,.07);
  --modal-bg:rgba(0,0,0,0.5);
  --chart-header:#ffffff; --chart-brd:#e0e3eb;
  --nav-btn-bg:rgba(0,0,0,0.06); --nav-btn-color:#131722;
  --close-color:#ef5350;
  --cloud-color:#26a69a;
}

/* ══════════════════════════════════════
   BASE
══════════════════════════════════════ */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body {
  background:var(--bg); color:var(--t1);
  font-family:'Inter',sans-serif; font-size:13px;
  line-height:1.5; min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  transition:background .25s, color .25s;
}
.wrap { max-width:520px; margin:0 auto; padding:0 0 40px; }

/* ══════════════════════════════════════
   ANIMATIONS — KEYFRAMES
══════════════════════════════════════ */
@keyframes topbarIn    { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes iconBounce  { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
@keyframes iconFloat   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes fadeLeft    { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
@keyframes fadeScale   { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
@keyframes slideUp     { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes rowIn       { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
@keyframes thIn        { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes rowFlash    { 0%{background:rgba(41,98,255,.07)} 100%{background:transparent} }
@keyframes cntPop      { 0%{transform:scale(1)} 50%{transform:scale(1.45)} 100%{transform:scale(1)} }
@keyframes nameShimmer { 0%,100%{background-position:0% center} 50%{background-position:100% center} }
@keyframes scanLine    { 0%{left:-50%;opacity:0} 10%{opacity:.6} 90%{opacity:.6} 100%{left:110%;opacity:0} }
@keyframes scanPulse   { 0%,100%{box-shadow:0 2px 8px rgba(41,98,255,.3)} 50%{box-shadow:0 2px 20px rgba(41,98,255,.65)} }
@keyframes ringOut     { 0%{transform:scale(.5);opacity:.8} 100%{transform:scale(2.6);opacity:0} }
@keyframes ltPulse     { 0%,100%{opacity:1} 50%{opacity:.45} }
@keyframes bdgSweep    { 0%,55%,100%{left:-80%} 30%{left:130%} }
@keyframes stSweep     { 0%,60%,100%{left:-60%} 35%{left:115%} }
@keyframes dotPing     { 0%,100%{box-shadow:0 0 0 0 rgba(38,166,154,.5)} 50%{box-shadow:0 0 0 5px rgba(38,166,154,0)} }
@keyframes badgeGlow   { 0%,100%{opacity:1} 40%{opacity:.3;box-shadow:0 0 10px var(--bull)} }
@keyframes badgeGlowR  { 0%,100%{opacity:1} 40%{opacity:.3;box-shadow:0 0 10px var(--bear)} }
@keyframes barShimmer  { 0%{left:-100%} 100%{left:200%} }
@keyframes flashDown   { 0%{opacity:0;top:62px} 15%{opacity:1} 100%{opacity:0;top:100vh} }

/* Elements start hidden for JS-controlled entrance */
.topbar, .brand-icon, .brand-wrap, .brand-sub,
.live-badge, .ibtn, .scan-btn,
.filter-tabs, .sbar,
thead th, .ani-row { opacity:0; }

/* Entrance classes */
.topbar.a     { animation:topbarIn  .5s cubic-bezier(.22,1,.36,1) forwards }
.brand-icon.a { animation:iconBounce .55s cubic-bezier(.34,1.56,.64,1) forwards }
.brand-wrap.a { animation:fadeLeft  .45s ease forwards }
.brand-sub.a  { animation:fadeLeft  .4s  ease forwards }
.live-badge.a { animation:fadeScale .4s  ease forwards }
.ibtn.a       { animation:fadeScale .35s ease forwards }
.scan-btn.a   { animation:fadeScale .35s ease forwards }
.filter-tabs.a{ animation:slideUp   .4s  ease forwards }
.sbar.a       { animation:slideUp   .4s  ease forwards }
thead th.a    { animation:thIn      .4s  ease forwards }
.ani-row.a    { animation:rowIn     .45s ease forwards }
.ani-row.flash{ animation:rowIn     .45s ease forwards, rowFlash .6s .45s ease forwards }
.badge-flash-bull { animation:badgeGlow  .6s ease forwards }
.badge-flash-bear { animation:badgeGlowR .6s ease forwards }
.cnt.pop      { animation:cntPop .35s cubic-bezier(.34,1.56,.64,1) }

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:62px;
  background:var(--s1); border-bottom:1px solid var(--brd);
  position:sticky; top:0; z-index:10;
  box-shadow:var(--topsh);
  overflow:hidden;
}
.topbar::after {
  content:''; position:absolute;
  top:0; bottom:0; left:-50%; width:40%;
  background:linear-gradient(90deg,transparent,rgba(41,98,255,.05),transparent);
  animation:scanLine 4s 2s ease-in-out infinite;
  pointer-events:none;
}

.brand { display:flex; align-items:center; gap:11px; }
.brand-icon {
  width:38px; height:38px; border-radius:9px;
  background:var(--acc); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:#fff;
  box-shadow:0 2px 12px rgba(41,98,255,.35);
  transition:transform .2s, box-shadow .2s;
  cursor:default;
}
.brand-icon.floating { animation:iconFloat 3s ease-in-out infinite; }
.brand-icon:hover { transform:scale(1.1) rotate(-6deg) !important; box-shadow:0 5px 22px rgba(41,98,255,.55); }

.brand-wrap {
  font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
  letter-spacing:-.3px; line-height:1;
}
/* Shimmer on inner span — independent of entrance animation */
.shimmer-name {
  background:linear-gradient(90deg,var(--t1) 0%,var(--t1) 25%,var(--acc) 48%,var(--t1) 70%,var(--t1) 100%);
  background-size:250% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:nameShimmer 3.5s ease-in-out infinite;
  display:inline-block;
}
.brand-sub { font-size:9px; font-weight:600; letter-spacing:2px; color:var(--t3); text-transform:uppercase; margin-top:2px; }

/* ── LIVE BADGE ── */
.live-badge {
  display:flex; align-items:center; gap:7px;
  background:var(--s2); border:1px solid var(--brd);
  border-radius:6px; padding:5px 11px; font-size:10px; font-weight:600;
  position:relative; overflow:hidden; cursor:default;
}
.live-badge::after {
  content:''; position:absolute; top:0; bottom:0; left:-80%; width:60%;
  background:linear-gradient(90deg,transparent,rgba(38,166,154,.15),transparent);
  animation:bdgSweep 2.8s 1.5s ease-in-out infinite;
}
.dot-ring { position:relative; width:10px; height:10px; flex-shrink:0; }
.dot-ring .core { position:absolute; inset:2px; border-radius:50%; background:var(--bull); box-shadow:0 0 5px var(--bull); }
.dot-ring .ring { position:absolute; inset:0; border-radius:50%; border:1.5px solid var(--bull); opacity:0; animation:ringOut 2s ease-out infinite; }
.dot-ring .ring:nth-child(2) { animation-delay:0s; }
.dot-ring .ring:nth-child(3) { animation-delay:.65s; }
.dot-ring .ring:nth-child(4) { animation-delay:1.3s; }
.live-text { color:var(--bull); font-weight:700; letter-spacing:.5px; position:relative; z-index:1; animation:ltPulse 2s ease-in-out infinite; }

/* ── BUTTONS ── */
.ibtn {
  background:transparent; border:1px solid var(--brd); border-radius:6px;
  padding:6px 9px; cursor:pointer; font-size:14px; line-height:1; color:var(--t2);
  transition:border-color .15s, background .15s, transform .1s;
}
.ibtn:hover { border-color:var(--brd2); background:var(--s2); color:var(--t1); transform:translateY(-1px); }
.ibtn:active { transform:translateY(0); }

/* ── SCAN BUTTON (replaces old .scan-btn style) ── */
.scan-btn {
  background:var(--acc); border:none; border-radius:6px;
  padding:7px 14px; cursor:pointer;
  font-size:11px; font-weight:600; color:#fff;
  font-family:'Inter',sans-serif; letter-spacing:.3px;
  animation:scanPulse 2.5s ease-in-out infinite;
  transition:opacity .15s, transform .15s;
}
.scan-btn:hover { opacity:.9; transform:translateY(-1px); }
.scan-btn:active { transform:translateY(0); }
.scan-btn:disabled { opacity:.6; cursor:not-allowed; animation:none; }

/* ══════════════════════════════════════
   STATUS BAR (original #st, #pb IDs)
══════════════════════════════════════ */
.sbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px;
  background:var(--s2); border-bottom:1px solid var(--brd);
  font-size:10.5px; color:var(--t3);
  cursor:pointer; position:relative; overflow:hidden;
}
.sbar::after {
  content:''; position:absolute; top:0; bottom:0; left:-60%; width:45%;
  background:linear-gradient(90deg,transparent,rgba(41,98,255,.05),transparent);
  animation:stSweep 5s 3s ease-in-out infinite;
}
.sbar:hover { background:var(--s3); }
#st { color:var(--bull); font-weight:600; position:relative; z-index:1; }
#pb { color:#f0b929; font-weight:500; position:relative; z-index:1; }

/* ── status dot ── */
.sl-dot {
  display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--bull); box-shadow:0 0 0 0 rgba(38,166,154,.4);
  animation:dotPing 2s ease-in-out infinite;
  margin-right:4px; vertical-align:middle;
}

/* ══════════════════════════════════════
   FILTER TABS (replaces old .sum cards)
══════════════════════════════════════ */
.filter-tabs {
  display:flex; gap:2px; padding:0 14px;
  background:var(--s1); border-bottom:1px solid var(--brd);
}
.ftab {
  padding:10px 12px 9px; font-size:11.5px; font-weight:500; cursor:pointer;
  color:var(--t2); background:transparent; border:none;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  font-family:'Inter',sans-serif; transition:color .18s, border-color .18s;
}
.ftab:hover { color:var(--t1); }
.ftab.active { color:var(--t1); font-weight:600; }
.ftab.active.all  { border-bottom-color:var(--acc); }
.ftab.active.bull { border-bottom-color:var(--bull); color:var(--bull); }
.ftab.active.bear { border-bottom-color:var(--bear); color:var(--bear); }
.cnt {
  display:inline-block; margin-left:5px;
  font-size:10px; padding:1px 6px; border-radius:10px; font-weight:700;
}
.ftab .cnt       { background:var(--s3); color:var(--t3); }
.ftab.bull .cnt, .ftab.active.bull .cnt { background:var(--bullbg); color:var(--bull); }
.ftab.bear .cnt, .ftab.active.bear .cnt { background:var(--bearbg); color:var(--bear); }

/* ══════════════════════════════════════
   TABLE
══════════════════════════════════════ */
.tw { background:var(--s1); }

table { width:100%; border-collapse:collapse; table-layout:fixed; }
col.c-pair { width:110px; }
col.c-tf   { width:46px; }
col.c-sent { width:auto; }

thead { position:sticky; top:62px; background:var(--s1); z-index:5; box-shadow:var(--topsh); }
thead tr { border-bottom:2px solid var(--brd); }
th {
  padding:9px 0;
  font-size:10px; font-weight:600; letter-spacing:.7px;
  color:var(--t3); text-transform:uppercase;
  text-align:center; white-space:nowrap; overflow:hidden;
}
th.th-pair { text-align:left; padding-left:16px; }
th.th-sent { text-align:left; padding-left:6px; }

tbody tr { border-bottom:1px solid var(--brd); cursor:pointer; background:var(--s1); transition:background .15s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--s2); }

td { padding:11px 0; text-align:center; font-size:12.5px; color:var(--t1); overflow:hidden; }
td.td-pair { text-align:left; padding-left:16px; position:relative; }
td.td-sent { text-align:left; padding-left:6px; padding-right:14px; }

/* left accent bar on first cell (NOT on tr — tr::before creates phantom column) */
td.td-pair::before {
  content:''; position:absolute; left:0; top:4px; bottom:4px;
  width:2.5px; border-radius:0 2px 2px 0;
  background:linear-gradient(180deg,var(--acc),var(--bull));
  transform:scaleY(0); transform-origin:center;
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
tbody tr:hover td.td-pair::before { transform:scaleY(1); }

/* ── PAIR NAME (original .pn class from render.js) ── */
.pn {
  font-family:'Syne',sans-serif; font-size:13.5px; font-weight:700;
  color:var(--t1); cursor:pointer;
  display:block; transition:color .15s;
  padding-left:0;
}
.pcat-label { font-size:9px; color:var(--t3); margin-top:1.5px; letter-spacing:.5px; text-transform:uppercase; display:block; }
tbody tr:hover .pn { color:var(--acc); }

/* ── SIGNAL BADGES (original .sig class from render.js) ── */
.sig {
  display:inline-flex; align-items:center; justify-content:center;
  width:40px; height:20px; border-radius:4px;
  font-size:9px; font-weight:700; letter-spacing:.4px;
  border:none; transition:transform .15s;
}
tbody tr:hover .sig { transform:scale(1.07); }
.sig.bull { background:var(--bullbg); color:var(--bull); }
.sig.bear { background:var(--bearbg); color:var(--bear); }

/* ── SENTIMENT (original classes from render.js) ── */
.sentiment-bar {
  display:flex; height:6px; border-radius:3px;
  overflow:hidden; width:100%; min-width:82px;
  background:var(--s3); position:relative;
}
.sentiment-bar::after {
  content:''; position:absolute; top:0; bottom:0; left:-100%; width:60%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:barShimmer 2.5s 1.5s ease-in-out infinite;
}
.s-bear {
  background:var(--bear); opacity:.65;
  border-radius:3px 0 0 3px;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:7.5px; font-weight:700;
  white-space:nowrap; overflow:hidden; flex-shrink:0;
  transition:width .4s ease;
}
.s-bull {
  background:var(--bull); opacity:.65;
  border-radius:0 3px 3px 0;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:7.5px; font-weight:700;
  white-space:nowrap; overflow:hidden; flex-shrink:0;
  transition:width .4s ease;
}
td.sent-cell { padding-top:11px !important; padding-bottom:11px !important; }
.sent-nums { display:flex; justify-content:space-between; margin-top:3px; font-size:9.5px; }
.sn-b { color:rgba(239,83,80,.75); }
.sn-u { color:rgba(38,166,154,.75); }

/* ══════════════════════════════════════
   MODAL (original structure preserved)
══════════════════════════════════════ */
.modal {
  position:fixed; inset:0; background:var(--modal-bg);
  z-index:3000; display:none; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(6px);
}
.modal.open { display:flex; animation:fadeScale .25s ease; }
.m-card {
  background:var(--s2); border:1px solid var(--brd);
  border-radius:18px; width:100%; max-width:400px;
  padding:22px; color:var(--t1);
  box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
}

/* ══════════════════════════════════════
   CHART OVERLAY (original structure preserved)
══════════════════════════════════════ */
#chartOverlay {
  position:fixed; inset:0; background:var(--bg);
  z-index:4000; display:none; flex-direction:column;
}
.nav-btn {
  background:var(--nav-btn-bg); color:var(--nav-btn-color);
  border:1px solid var(--brd); padding:8px 15px;
  border-radius:8px; cursor:pointer; font-weight:bold;
  transition:background .15s, transform .1s;
  font-family:'Inter',sans-serif;
}
.nav-btn:hover { background:var(--s3); transform:translateY(-1px); }
.nav-btn:active { transform:translateY(0); }

/* ══════════════════════════════════════
   DESKTOP SPLIT MODE (original preserved)
══════════════════════════════════════ */
body.desktop-mode { display:flex; height:100vh; overflow:hidden; }
body.desktop-mode .wrap {
  width:420px; min-width:320px; max-width:420px;
  height:100vh; overflow-y:auto; padding-bottom:20px;
  flex-shrink:0; margin:0; border-right:1px solid var(--brd);
}
body.desktop-mode #chartOverlay {
  position:relative !important; inset:auto !important;
  flex:1; height:100vh; display:flex !important;
  flex-direction:column; z-index:1 !important;
}
body.desktop-mode #tv_chart_container { min-height:0; }
body.desktop-mode #chartCloseBtn { display:none !important; }
body.desktop-mode #tv_chart_container:empty {
  display:flex !important; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
}
body.desktop-mode #tv_chart_container:empty::before { content:'📊'; font-size:44px; opacity:.2; }
body.desktop-mode #tv_chart_container:empty::after {
  content:'Select a pair to view chart';
  font-family:'Inter',sans-serif; font-size:12px; color:var(--t2);
}

/* Scan flash line */
.scan-flash {
  position:fixed; top:62px; left:0; right:0; height:1.5px;
  background:linear-gradient(90deg,transparent,var(--acc),var(--bull),transparent);
  z-index:20; opacity:0; pointer-events:none;
}
.scan-flash.run { animation:flashDown .9s ease forwards; }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--brd2); border-radius:2px; }
</style>
</head>
<body>

<div class="scan-flash" id="sf"></div>

<div class="wrap">

  <!-- ── TOPBAR ── -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">I</div>
      <div>
        <div class="brand-wrap"><span class="shimmer-name">ICI SCREENER</span></div>
        <div class="brand-sub">Multi-pair scanner</div>
      </div>
    </div>

    <div class="live-badge">
      <div class="dot-ring">
        <div class="core"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      </div>
      <span class="live-text">LIVE</span>
    </div>

    <div style="display:flex;align-items:center;gap:7px;">
      <button class="ibtn" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <button class="ibtn" onclick="toggleDesktopMode()" id="desktopBtn" title="Desktop Mode">🖥️</button>
      <button class="scan-btn" onclick="manualScan()">🔄 SCAN</button>
    </div>
  </div>

  <!-- ── STATUS BAR (original IDs preserved) ── -->
  <div class="sbar" onclick="openM()">
    <span><span class="sl-dot"></span><span id="st">Connecting...</span></span>
    <span id="pb" style="color:#f0b929">👁 Target List ❯</span>
  </div>

  <!-- ── FILTER TABS (replaces old sum cards, same setFilter calls) ── -->
  <div class="filter-tabs">
    <button class="ftab active all"  onclick="filterTabClick(this,'all')">All<span class="cnt" id="ac">36</span></button>
    <button class="ftab bull"        onclick="filterTabClick(this,'bull')">Bullish<span class="cnt" id="bc">0</span></button>
    <button class="ftab bear"        onclick="filterTabClick(this,'bear')">Bearish<span class="cnt" id="rc">0</span></button>
  </div>

  <!-- ── TABLE ── -->
  <div class="tw">
    <table>
      <colgroup>
        <col class="c-pair">
        <col class="c-tf"><col class="c-tf"><col class="c-tf"><col class="c-tf">
        <col class="c-sent">
      </colgroup>
      <thead>
        <tr>
          <th class="th-pair">Pair</th>
          <th>1H</th><th>4H</th><th>1D</th><th>1W</th>
          <th class="th-sent">Sentiment</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>

</div><!-- /.wrap -->

<!-- ── MODAL (original preserved) ── -->
<div class="modal" id="mo" onclick="this.classList.remove('open')">
  <div class="m-card" onclick="event.stopPropagation()">
    <div id="ml"></div>
  </div>
</div>

<!-- ── CHART OVERLAY (original preserved) ── -->
<div id="chartOverlay">
  <div style="padding:10px 15px;background:var(--chart-header);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--chart-brd);">
    <div style="display:flex;gap:12px;align-items:center;">
      <button class="nav-btn" onclick="movePair(-1)">❮</button>
      <span id="cp" style="color:var(--t1);font-weight:800;font-family:'Syne',sans-serif;font-size:18px;min-width:80px;text-align:center;">Pair</span>
      <button class="nav-btn" onclick="movePair(1)">❯</button>
    </div>
    <span id="chartCloseBtn" onclick="closeC()" style="color:var(--close-color);font-size:14px;font-weight:800;cursor:pointer;padding:10px;">✕ CLOSE</span>
  </div>
  <div id="tv_chart_container" style="flex:1;"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script src="js/firebase.js"></script>
<script src="js/render.js"></script>
<script src="js/chart.js"></script>
<script src="js/modal.js"></script>

<script>
/* ══════════════════════════════════════
   THEME TOGGLE (original logic preserved)
══════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('ici-theme', isDark ? 'light' : 'dark');
}
(function(){
  const saved = localStorage.getItem('ici-theme');
  if(saved){
    document.documentElement.setAttribute('data-theme', saved);
    document.addEventListener('DOMContentLoaded', function(){
      const btn = document.getElementById('themeBtn');
      if(btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
    });
  }
})();

/* ══════════════════════════════════════
   MANUAL SCAN (original preserved)
══════════════════════════════════════ */
function manualScan() {
  const btn = document.querySelector('.scan-btn');
  btn.textContent = '⏳ Scanning...';
  btn.disabled = true;
  // scan flash
  const sf = document.getElementById('sf');
  sf.classList.remove('run'); void sf.offsetWidth; sf.classList.add('run');
  fetch('/scan')
    .then(() => {
      btn.textContent = '✅ Started!';
      setTimeout(() => { btn.textContent = '🔄 SCAN'; btn.disabled = false; }, 3000);
    })
    .catch(() => {
      btn.textContent = '❌ Error';
      setTimeout(() => { btn.textContent = '🔄 SCAN'; btn.disabled = false; }, 3000);
    });
}

/* ══════════════════════════════════════
   AUTO RELOAD (original preserved)
══════════════════════════════════════ */
window.addEventListener('load', function() {
  setTimeout(function() {
    if(document.getElementById('st').textContent === 'Connecting...') {
      location.reload();
    }
  }, 5000);
});

/* ══════════════════════════════════════
   DESKTOP MODE (original preserved)
══════════════════════════════════════ */
function toggleDesktopMode() {
  const isDesktop = document.body.classList.toggle('desktop-mode');
  const overlay = document.getElementById('chartOverlay');
  const btn = document.getElementById('desktopBtn');
  if(isDesktop) {
    overlay.style.display = 'flex';
    btn.textContent = '📱'; btn.title = 'Switch to Mobile';
  } else {
    overlay.style.display = 'none';
    btn.textContent = '🖥️'; btn.title = 'Switch to Desktop';
  }
  localStorage.setItem('ici-mode', isDesktop ? 'desktop' : 'mobile');
}
window.addEventListener('load', function() {
  if(typeof window.closeC === 'function') {
    const _orig = window.closeC;
    window.closeC = function() {
      if(document.body.classList.contains('desktop-mode')) return;
      _orig.apply(this, arguments);
    };
  }
  if(localStorage.getItem('ici-mode') === 'desktop') {
    document.body.classList.add('desktop-mode');
    document.getElementById('desktopBtn').textContent = '📱';
    document.getElementById('desktopBtn').title = 'Switch to Mobile';
    document.getElementById('chartOverlay').style.display = 'flex';
  }
});

/* ══════════════════════════════════════
   FILTER TABS — wrapper only updates tab
   active state, then calls render.js setFilter
══════════════════════════════════════ */
function filterTabClick(el, type) {
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if(typeof setFilter === 'function') setFilter(type);
}

/* ══════════════════════════════════════
   ENTRANCE ANIMATIONS
   — replays every time page becomes visible
══════════════════════════════════════ */
function playAll() {
  const entranceEls = [
    '.topbar','.brand-icon','.brand-wrap','.brand-sub',
    '.live-badge','.ibtn','.scan-btn',
    '.filter-tabs','.sbar','thead th','.ani-row'
  ];
  entranceEls.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      el.classList.remove('a','flash','floating');
      el.style.opacity = '0';
    });
  });
  void document.body.offsetHeight;

  function a(sel, delay) {
    setTimeout(() => {
      document.querySelectorAll(sel).forEach(el => {
        el.style.opacity = ''; el.classList.add('a');
      });
    }, delay);
  }

  a('.topbar', 0);
  setTimeout(() => {
    const icon = document.querySelector('.brand-icon');
    icon.style.opacity = ''; icon.classList.add('a');
    setTimeout(() => icon.classList.add('floating'), 600);
  }, 140);
  a('.brand-wrap', 200); a('.brand-sub', 270);
  a('.live-badge', 320);
  document.querySelectorAll('.ibtn').forEach((btn,i) =>
    setTimeout(() => { btn.style.opacity=''; btn.classList.add('a'); }, 370+i*65)
  );
  a('.scan-btn', 500);
  a('.filter-tabs', 180); a('.sbar', 260);
  document.querySelectorAll('thead th').forEach((th,i) =>
    setTimeout(() => { th.style.opacity=''; th.classList.add('a'); }, 300+i*45)
  );
  document.querySelectorAll('.ani-row').forEach((row,i) =>
    setTimeout(() => { row.style.opacity=''; row.classList.add('flash'); }, 360+i*65)
  );
  // badge glow
  setTimeout(() => {
    document.querySelectorAll('.sig.bull').forEach((el,i) =>
      setTimeout(() => { el.classList.add('badge-flash-bull'); setTimeout(()=>el.classList.remove('badge-flash-bull'),700); }, i*30)
    );
    document.querySelectorAll('.sig.bear').forEach((el,i) =>
      setTimeout(() => { el.classList.add('badge-flash-bear'); setTimeout(()=>el.classList.remove('badge-flash-bear'),700); }, i*30)
    );
  }, 900);
}

// Re-run every time page becomes visible
document.addEventListener('visibilitychange', () => { if(!document.hidden) playAll(); });
window.addEventListener('pageshow', playAll);

/* ══════════════════════════════════════
   OBSERVE #tb — play animations when
   render.js fills the table rows
══════════════════════════════════════ */
const tbObserver = new MutationObserver(() => {
  document.querySelectorAll('#tb tr').forEach(tr => tr.classList.add('ani-row'));
  playAll();
});
tbObserver.observe(document.getElementById('tb'), { childList:true });
</script>
</body>
</html>
